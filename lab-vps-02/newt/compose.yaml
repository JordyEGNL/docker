services:
  newt:
    image: fosrl/newt
    container_name: newt
    restart: unless-stopped
    env_file:
      - .env
    volumes:
        - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
        - DOCKER_SOCKET=http://dockerproxy:2375

networks:
  default:
    name: frontend
    external: true